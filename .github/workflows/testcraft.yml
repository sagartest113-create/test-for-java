name: 🤖 TestCraft AI — Generate Tests

on:
  issue_comment:
    types: [created]

jobs:
  generate-tests:
    if: github.actor != 'github-actions[bot]' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/generate-tests')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Get PR head ref
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number
            });

            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install node-fetch
        working-directory: .github/scripts

      - name: Generate tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        working-directory: .github/scripts
        run: node generate-tests.js

      - name: Comment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const resultPath = process.env.GITHUB_WORKSPACE + '/.github/scripts/result.json';

            let body = '🤖 **TestCraft AI Result**\n\n';

            if (fs.existsSync(resultPath)) {
              const r = JSON.parse(fs.readFileSync(resultPath,'utf8'));

              if (r.success) {
                body += `✅ Generated ${r.filesCreated || 0} test file(s).`;
              } else {
                body += `❌ ${r.error}`;
              }

            } else {
              body += '❌ No result file found.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });